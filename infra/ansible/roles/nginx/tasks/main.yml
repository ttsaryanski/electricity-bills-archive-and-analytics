- name: Deploy nginx site config
  template:
    src: powertrack.conf.j2
    dest: /etc/nginx/sites-available/powertrack.conf
    mode: "0644"

- name: Enable site
  file:
    src: /etc/nginx/sites-available/powertrack.conf
    dest: /etc/nginx/sites-enabled/powertrack.conf
    state: link
    force: true

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent

- name: Restart nginx
  service:
    name: nginx
    state: restarted
    enabled: true

- name: Enable HTTPS with certbot
  command: certbot --nginx -d {{ domain_name }} --non-interactive --agree-tos -m {{ admin_email }} --redirect
  args:
    creates: /etc/letsencrypt/live/{{ domain_name }}/fullchain.pem
